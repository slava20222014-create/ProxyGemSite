<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toilet Tower Defense - ОНЛАЙН 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            color: white;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .stats { display: flex; gap: 30px; font-weight: bold; }
        .stats span { color: gold; }
        .online-panel {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 15px;
            z-index: 100;
            min-width: 200px;
            pointer-events: none;
        }
        .online-panel h4 { margin: 0 0 10px 0; color: #44ff44; }
        .online-panel div { font-size: 12px; margin: 5px 0; }
        .auth-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            z-index: 200;
            border: 2px solid gold;
            min-width: 320px;
        }
        .auth-panel input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .auth-panel button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 25px;
            border: none;
            background: gold;
            font-weight: bold;
            cursor: pointer;
        }
        .tower-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .tower-btn {
            background: #2c3e66;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
        }
        .tower-btn.selected { background: gold; color: black; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>🚽 TOILET TOWER DEFENSE - ОНЛАЙН 3D</div>
        <div class="stats">
            <div>❤️ БАЗА: <span id="healthValue">10</span></div>
            <div>💩 СЧЁТ: <span id="scoreValue">0</span></div>
            <div>🪙 МОНЕТЫ: <span id="coinsValue">500</span></div>
        </div>
    </div>
    <div class="online-panel" id="onlinePanel">
        <h4>🌐 ОНЛАЙН (<span id="onlineCount">0</span>)</h4>
        <div id="playersList"></div>
    </div>
    <div class="tower-panel" id="towerPanel" style="display: none;">
        <button class="tower-btn" data-tower="Speakerman">🗼 Speakerman (100)</button>
        <button class="tower-btn" data-tower="Cameraman">📷 Cameraman (150)</button>
        <button class="tower-btn" data-tower="Large">💪 Large (250)</button>
        <button class="tower-btn" data-tower="TV">📺 TV Man (300)</button>
    </div>
    <div id="authPanel" class="auth-panel">
        <h2>🚽 TOILET TOWER DEFENSE</h2>
        <p>🔥 МУЛЬТИПЛЕЕР 3D 🔥</p>
        <input type="text" id="username" placeholder="Никнейм">
        <button id="connectBtn">ВОЙТИ В ИГРУ</button>
        <p style="font-size: 12px; margin-top: 15px;">Сервер: wss://toilet-tower.onrender.com</p>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ========== ПЕРЕМЕННЫЕ ==========
        let socket = null;
        let currentUser = null;
        let otherPlayers = new Map();
        let enemies = [];
        let towers = [];
        let score = 0;
        let baseHealth = 10;
        let coins = 500;
        let selectedTower = 'Speakerman';
        
        // 3D сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        // Земля
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 30),
            new THREE.MeshStandardMaterial({ color: 0x3a7a3a })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // База
        const baseGroup = new THREE.Group();
        const baseCore = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 1.8, 1.8),
            new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x441100 })
        );
        baseCore.castShadow = true;
        baseGroup.add(baseCore);
        const baseRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.2, 0.1, 32, 60),
            new THREE.MeshStandardMaterial({ color: 0xffaa44 })
        );
        baseRing.rotation.x = Math.PI / 2;
        baseRing.position.y = 0.9;
        baseGroup.add(baseRing);
        baseGroup.position.set(0, 0, 0);
        scene.add(baseGroup);
        
        // Игрок (свой персонаж)
        let myPlayerMesh = null;
        
        function createPlayerMesh(color, name) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.6), new THREE.MeshStandardMaterial({ color: color }));
            body.position.y = 0.4;
            group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
            head.position.y = 0.9;
            group.add(head);
            return group;
        }
        
        function updateUI() {
            document.getElementById('healthValue').textContent = baseHealth;
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('coinsValue').textContent = coins;
        }
        
        // Подключение к серверу
        document.getElementById('connectBtn').onclick = () => {
            const username = document.getElementById('username').value.trim();
            if (!username) return;
            currentUser = username;
            
            // ПОДКЛЮЧЕНИЕ К ОНЛАЙН СЕРВЕРУ
            socket = io('https://toilet-tower.onrender.com');
            // Если сервер не работает, используй локальный:
            // socket = io('http://localhost:3000');
            
            socket.on('connect', () => {
                console.log('✅ Подключен к серверу!');
                socket.emit('player_join', { username: currentUser });
                document.getElementById('authPanel').classList.add('hidden');
                document.getElementById('towerPanel').style.display = 'flex';
            });
            
            socket.on('players_update', (players) => {
                document.getElementById('onlineCount').textContent = players.length;
                const listDiv = document.getElementById('playersList');
                listDiv.innerHTML = players.map(p => `👤 ${p.username} ${p.username === currentUser ? '(Вы)' : ''}`).join('<br>');
                
                // Обновляем 3D игроков
                for (let p of players) {
                    if (p.username !== currentUser && !otherPlayers.has(p.username)) {
                        const playerMesh = createPlayerMesh(0x44aa44, p.username);
                        playerMesh.position.set(p.x || 0, 0, p.z || 0);
                        scene.add(playerMesh);
                        otherPlayers.set(p.username, playerMesh);
                    } else if (p.username !== currentUser && otherPlayers.has(p.username)) {
                        const mesh = otherPlayers.get(p.username);
                        if (mesh && p.x !== undefined) mesh.position.set(p.x, 0, p.z);
                    }
                }
            });
            
            socket.on('enemy_spawn', (enemyData) => {
                // Создание врага, полученного от сервера
                console.log('Враг заспавнен сервером', enemyData);
            });
            
            socket.on('game_state', (state) => {
                score = state.score;
                baseHealth = state.baseHealth;
                updateUI();
            });
        };
        
        // Кнопки башен
        document.querySelectorAll('.tower-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedTower = btn.dataset.tower;
            };
        });
        
        // Рейкаст для установки башен
        const raycaster = new THREE.Raycaster();
        const clickPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        
        window.addEventListener('click', (e) => {
            if (e.target.closest('.tower-panel') || e.target.closest('.auth-panel')) return;
            const mouse = new THREE.Vector2();
            mouse.x = (e.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(e.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const point = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(clickPlane, point)) {
                if (socket && coins >= 100) {
                    socket.emit('place_tower', { x: point.x, z: point.z, type: selectedTower });
                    coins -= 100;
                    updateUI();
                }
            }
        });
        
        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (baseRing) baseRing.rotation.z += 0.02;
            renderer.render(scene, camera);
        }
        animate();
        updateUI();
        
        // Движение игрока (WASD)
        const keyState = { w: false, s: false, a: false, d: false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = true;
            if (key === 's') keyState.s = true;
            if (key === 'a') keyState.a = true;
            if (key === 'd') keyState.d = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = false;
            if (key === 's') keyState.s = false;
            if (key === 'a') keyState.a = false;
            if (key === 'd') keyState.d = false;
        });
        
        setInterval(() => {
            if (!socket || !currentUser) return;
            let moveX = 0, moveZ = 0;
            if (keyState.w) moveZ -= 0.15;
            if (keyState.s) moveZ += 0.15;
            if (keyState.a) moveX -= 0.15;
            if (keyState.d) moveX += 0.15;
            if (moveX !== 0 || moveZ !== 0) {
                socket.emit('player_move', { x: moveX, z: moveZ });
            }
        }, 50);
        
        console.log('🎮 ОНЛАЙН 3D ИГРА ЗАПУЩЕНА! Жди других игроков!');
    </script>
</body>
</html>
