<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toilet Tower Defense - 3D ОНЛАЙН</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            color: white;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .stats { display: flex; gap: 30px; font-weight: bold; }
        .stats span { color: gold; }
        .online-panel {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 15px;
            z-index: 100;
            min-width: 180px;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        .online-panel h4 { margin: 0 0 10px 0; color: #44ff44; }
        .online-panel div { font-size: 12px; margin: 3px 0; }
        .tower-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            pointer-events: auto;
        }
        .tower-btn {
            background: #2c3e66;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .tower-btn:hover { background: #3e5a8f; transform: scale(1.02); }
        .tower-btn.selected { background: gold; color: black; }
        .auth-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            z-index: 200;
            border: 2px solid gold;
            min-width: 320px;
            backdrop-filter: blur(10px);
        }
        .auth-panel input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 16px;
            text-align: center;
        }
        .auth-panel button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 25px;
            border: none;
            background: gold;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .hidden { display: none; }
        .health-bar {
            position: absolute;
            top: -30px;
            left: -25px;
            width: 50px;
            height: 6px;
            background: red;
            border-radius: 3px;
            overflow: hidden;
        }
        .health-fill {
            height: 100%;
            background: lime;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>🚽 TOILET TOWER DEFENSE - 3D</div>
        <div class="stats">
            <div>❤️ БАЗА: <span id="healthValue">10</span></div>
            <div>💩 СЧЁТ: <span id="scoreValue">0</span></div>
            <div>🪙 МОНЕТЫ: <span id="coinsValue">500</span></div>
        </div>
    </div>
    
    <div class="online-panel">
        <h4>🌐 ОНЛАЙН (<span id="onlineCount">1</span>)</h4>
        <div id="playersList"></div>
        <div style="font-size: 10px; color: #888; margin-top: 8px;">⚡ Игроки сохраняются в браузере</div>
    </div>
    
    <div class="tower-panel" id="towerPanel" style="display: none;">
        <button class="tower-btn" data-tower="Speakerman">🗼 Speakerman (100)</button>
        <button class="tower-btn" data-tower="Cameraman">📷 Cameraman (150)</button>
        <button class="tower-btn" data-tower="Large">💪 Large Speakerman (250)</button>
        <button class="tower-btn" data-tower="TV">📺 TV Man (300)</button>
    </div>
    
    <div id="authPanel" class="auth-panel">
        <h2>🚽 TOILET TOWER DEFENSE</h2>
        <p style="margin: 10px 0; color: #aaa;">⚔️ МУЛЬТИПЛЕЕР 3D ⚔️</p>
        <input type="text" id="username" placeholder="Введи никнейм" autocomplete="off">
        <button id="playBtn">🔫 ИГРАТЬ</button>
        <p style="font-size: 11px; margin-top: 15px; color: #666;">✅ Данные сохраняются автоматически</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // ==================== СОХРАНЕНИЕ ДАННЫХ ====================
        let currentUser = localStorage.getItem('ttd_user');
        let userCoins = parseInt(localStorage.getItem('ttd_coins')) || 500;
        let userScore = parseInt(localStorage.getItem('ttd_score')) || 0;
        let userWins = parseInt(localStorage.getItem('ttd_wins')) || 0;
        let selectedTower = localStorage.getItem('ttd_tower') || 'Speakerman';
        
        // Имитация других игроков онлайн
        let otherPlayersList = JSON.parse(localStorage.getItem('ttd_online_players')) || [
            { username: 'ToiletHunter', x: -3, z: 4 },
            { username: 'SkibidiMaster', x: 5, z: -2 },
            { username: 'TV_King', x: -2, z: -3 }
        ];
        
        function saveData() {
            if (currentUser) {
                localStorage.setItem('ttd_user', currentUser);
                localStorage.setItem('ttd_coins', userCoins);
                localStorage.setItem('ttd_score', userScore);
                localStorage.setItem('ttd_wins', userWins);
                localStorage.setItem('ttd_tower', selectedTower);
            }
        }
        
        // ==================== 3D СЦЕНА ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 14);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.zoomSpeed = 1;
        controls.rotateSpeed = 1;
        controls.target.set(0, 1, 0);
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.3);
        backLight.position.set(-3, 5, -5);
        scene.add(backLight);
        
        // Земля
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7a3a, roughness: 0.8 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(28, 28), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const gridHelper = new THREE.GridHelper(26, 20, 0x88ff88, 0x448844);
        gridHelper.position.y = -0.15;
        scene.add(gridHelper);
        
        // Декоративные деревья
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x3c9e3c });
        for (let i = -11; i <= 11; i+=4) {
            for (let j = -11; j <= 11; j+=7) {
                if (Math.hypot(i, j) > 4.5) {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 0.8, 6), treeMat);
                    trunk.position.set(i, 0, j);
                    trunk.castShadow = true;
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.7, 8), leafMat);
                    leaves.position.set(i, 0.6, j);
                    leaves.castShadow = true;
                    scene.add(trunk);
                    scene.add(leaves);
                }
            }
        }
        
        // БАЗА
        const baseGroup = new THREE.Group();
        const baseCore = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 1.8, 1.8),
            new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x441100, metalness: 0.7 })
        );
        baseCore.castShadow = true;
        baseGroup.add(baseCore);
        
        const baseRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.2, 0.1, 32, 60),
            new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x552200 })
        );
        baseRing.rotation.x = Math.PI / 2;
        baseRing.position.y = 0.9;
        baseGroup.add(baseRing);
        
        const baseGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.9, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4411, transparent: true, opacity: 0.4 })
        );
        baseGlow.position.y = 0.2;
        baseGroup.add(baseGlow);
        
        baseGroup.position.set(0, 0, 0);
        scene.add(baseGroup);
        
        // Игрок (свой персонаж)
        let myPlayer = null;
        
        function createPlayerMesh(color, username, isMine = false) {
            const group = new THREE.Group();
            // Тело
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.6), new THREE.MeshStandardMaterial({ color: color, metalness: 0.3 }));
            body.position.y = 0.4;
            body.castShadow = true;
            group.add(body);
            // Голова
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
            head.position.y = 0.85;
            head.castShadow = true;
            group.add(head);
            // Глаза
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeMat);
            leftEye.position.set(-0.15, 0.95, 0.32);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeMat);
            rightEye.position.set(0.15, 0.95, 0.32);
            group.add(rightEye);
            
            if (!isMine) {
                // Имя над игроком
                const nameDiv = document.createElement('div');
                nameDiv.textContent = username;
                nameDiv.style.color = '#ffaa66';
                nameDiv.style.fontSize = '12px';
                nameDiv.style.fontWeight = 'bold';
                nameDiv.style.textShadow = '1px 1px 0 black';
                const nameLabel = new CSS2DObject(nameDiv);
                nameLabel.position.set(0, 1.2, 0);
                group.add(nameLabel);
            }
            return group;
        }
        
        // ==================== ИГРОВЫЕ ПЕРЕМЕННЫЕ ====================
        let enemies = [];
        let towers = [];
        let bullets = [];
        let baseHealth = 10;
        let score = userScore;
        let coins = userCoins;
        let lastSpawn = 0;
        
        // Стоимость башен
        const towerCosts = { 'Speakerman': 100, 'Cameraman': 150, 'Large': 250, 'TV': 300 };
        const towerColors = { 'Speakerman': 0x44aaff, 'Cameraman': 0xff44aa, 'Large': 0xffaa44, 'TV': 0xaa44ff };
        
        function updateUI() {
            document.getElementById('healthValue').textContent = baseHealth;
            document.getElementById('scoreValue').textContent = Math.floor(score);
            document.getElementById('coinsValue').textContent = Math.floor(coins);
            document.getElementById('onlineCount').textContent = otherPlayersList.length + 1;
            
            const listDiv = document.getElementById('playersList');
            listDiv.innerHTML = `<div style="color: #44ff44;">👑 ${currentUser} (Вы)</div>`;
            otherPlayersList.forEach(p => {
                listDiv.innerHTML += `<div>👤 ${p.username}</div>`;
            });
        }
        
        // Создание врага
        function createEnemy() {
            const group = new THREE.Group();
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.3 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.65, 0.8, 16), bodyMat);
            body.castShadow = true;
            group.add(body);
            
            const seat = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.07, 16, 32), new THREE.MeshStandardMaterial({ color: 0xdddddd }));
            seat.position.y = 0.45;
            seat.rotation.x = Math.PI / 2;
            group.add(seat);
            
            const tank = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.45, 0.5), new THREE.MeshStandardMaterial({ color: 0xaa9988 }));
            tank.position.set(0, 0.35, -0.45);
            group.add(tank);
            
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            leftEye.position.set(-0.2, 0.48, 0.55);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
            rightEye.position.set(0.2, 0.48, 0.55);
            group.add(rightEye);
            
            // Индикатор здоровья
            const healthDiv = document.createElement('div');
            healthDiv.className = 'health-bar';
            const fillDiv = document.createElement('div');
            fillDiv.className = 'health-fill';
            healthDiv.appendChild(fillDiv);
            const healthLabel = new CSS2DObject(healthDiv);
            healthLabel.position.set(0, 0.85, 0);
            group.add(healthLabel);
            
            const angle = Math.random() * Math.PI * 2;
            const radius = 11;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            group.position.set(x, 0, z);
            
            scene.add(group);
            
            return {
                obj: group,
                health: 3,
                maxHealth: 3,
                speed: 0.9,
                healthFill: fillDiv
            };
        }
        
        // Создание башни
        function createTower(x, z, type) {
            const group = new THREE.Group();
            
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.8, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0x8b5a2b }));
            base.castShadow = true;
            group.add(base);
            
            const bodyMat = new THREE.MeshStandardMaterial({ color: towerColors[type], metalness: 0.5 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.6, 0.6, 12), bodyMat);
            body.position.y = 0.35;
            group.add(body);
            
            let head;
            if (type === 'Speakerman') {
                head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0x44aaff }));
            } else if (type === 'Cameraman') {
                head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xff44aa }));
            } else if (type === 'Large') {
                head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
            } else {
                head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xaa44ff, emissive: 0x331166 }));
            }
            head.position.y = 0.7;
            group.add(head);
            
            group.position.set(x, 0, z);
            scene.add(group);
            
            return {
                obj: group,
                type: type,
                cooldown: 0,
                cooldownMax: 0.9,
                range: 5.5,
                damage: type === 'Large' ? 2 : (type === 'TV' ? 3 : 1),
                head: head
            };
        }
        
        // Снаряд
        function createBullet(fromPos, targetEnemy, damage, type) {
            const geometry = new THREE.SphereGeometry(0.18, 8, 8);
            let color = 0xffaa55;
            const projectile = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: color, emissive: 0x442200 }));
            projectile.position.copy(fromPos);
            scene.add(projectile);
            bullets.push({ mesh: projectile, target: targetEnemy, damage: damage, speed: 9 });
        }
        
        // Установка башни
        function tryPlaceTower(x, z) {
            const cost = towerCosts[selectedTower];
            if (coins < cost) return false;
            const distToBase = Math.hypot(x, z);
            if (distToBase < 2.2) return false;
            for (let t of towers) {
                if (Math.hypot(t.obj.position.x - x, t.obj.position.z - z) < 1.2) return false;
            }
            if (Math.abs(x) > 12 || Math.abs(z) > 12) return false;
            
            coins -= cost;
            towers.push(createTower(x, z, selectedTower));
            updateUI();
            saveData();
            return true;
        }
        
        // ==================== ОБРАБОТЧИКИ ====================
        document.getElementById('playBtn').onclick = () => {
            const username = document.getElementById('username').value.trim();
            if (!username) { alert('Введи никнейм!'); return; }
            currentUser = username;
            saveData();
            
            document.getElementById('authPanel').classList.add('hidden');
            document.getElementById('towerPanel').style.display = 'flex';
            
            // Создаём своего игрока
            myPlayer = createPlayerMesh(0xffaa44, currentUser, true);
            myPlayer.position.set(2, 0, 2);
            scene.add(myPlayer);
            
            // Создаём других игроков
            otherPlayersList.forEach(p => {
                const player = createPlayerMesh(0x44aa44, p.username, false);
                player.position.set(p.x, 0, p.z);
                scene.add(player);
            });
            
            updateUI();
        };
        
        // Выбор башни
        document.querySelectorAll('.tower-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedTower = btn.dataset.tower;
                localStorage.setItem('ttd_tower', selectedTower);
            };
        });
        document.querySelector(`.tower-btn[data-tower="${selectedTower}"]`)?.classList.add('selected');
        
        // Клик по земле для установки башни
        const raycaster = new THREE.Raycaster();
        const clickPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        
        window.addEventListener('click', (e) => {
            if (e.target.closest('.tower-panel') || e.target.closest('.auth-panel')) return;
            const mouse = new THREE.Vector2();
            mouse.x = (e.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(e.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const point = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(clickPlane, point)) {
                tryPlaceTower(point.x, point.z);
            }
        });
        
        // ==================== ИГРОВОЙ ЦИКЛ ====================
        let lastTime = performance.now() / 1000;
        
        function gameLoop(deltaTime) {
            if (!currentUser) return;
            const dt = Math.min(deltaTime, 0.033);
            
            // Спавн врагов
            lastSpawn += dt;
            if (lastSpawn >= 1.8 && enemies.length < 12) {
                lastSpawn = 0;
                enemies.push(createEnemy());
            }
            
            // Движение врагов
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (!e.obj.parent) continue;
                
                const dir = new THREE.Vector3(0, 0, 0).sub(e.obj.position).normalize();
                e.obj.position.x += dir.x * e.speed * dt;
                e.obj.position.z += dir.z * e.speed * dt;
                
                const healthPercent = (e.health / e.maxHealth) * 100;
                if (e.healthFill) e.healthFill.style.width = `${healthPercent}%`;
                
                const distToBase = Math.hypot(e.obj.position.x, e.obj.position.z);
                if (distToBase < 1.3) {
                    baseHealth = Math.max(0, baseHealth - 1);
                    updateUI();
                    scene.remove(e.obj);
                    enemies.splice(i, 1);
                    i--;
                    if (baseHealth <= 0) gameOver();
                    continue;
                }
                
                if (Math.abs(e.obj.position.x) > 15 || Math.abs(e.obj.position.z) > 15) {
                    scene.remove(e.obj);
                    enemies.splice(i, 1);
                    i--;
                }
            }
            
            // Стрельба башен
            for (let tower of towers) {
                if (tower.cooldown > 0) tower.cooldown -= dt;
                
                let closest = null;
                let minDist = Infinity;
                for (let enemy of enemies) {
                    const dist = Math.hypot(enemy.obj.position.x - tower.obj.position.x, enemy.obj.position.z - tower.obj.position.z);
                    if (dist < tower.range && dist < minDist) {
                        minDist = dist;
                        closest = enemy;
                    }
                }
                
                if (closest && tower.head) {
                    const dx = closest.obj.position.x - tower.obj.position.x;
                    const dz = closest.obj.position.z - tower.obj.position.z;
                    tower.head.rotation.y = Math.atan2(dx, dz);
                }
                
                if (closest && tower.cooldown <= 0) {
                    tower.cooldown = tower.cooldownMax;
                    const fromPos = tower.obj.position.clone();
                    fromPos.y += 1;
                    createBullet(fromPos, closest, tower.damage, tower.type);
                }
            }
            
            // Снаряды
            for (let i = 0; i < bullets.length; i++) {
                const bullet = bullets[i];
                if (!bullet.target || !bullet.target.obj.parent) {
                    scene.remove(bullet.mesh);
                    bullets.splice(i, 1);
                    i--;
                    continue;
                }
                const targetPos = bullet.target.obj.position.clone();
                targetPos.y += 0.4;
                const dir = targetPos.clone().sub(bullet.mesh.position).normalize();
                bullet.mesh.position.add(dir.multiplyScalar(bullet.speed * dt));
                if (bullet.mesh.position.distanceTo(targetPos) < 0.6) {
                    bullet.target.health -= bullet.damage;
                    if (bullet.target.health <= 0) {
                        score += 50;
                        coins += 25;
                        updateUI();
                        saveData();
                        scene.remove(bullet.target.obj);
                        const idx = enemies.indexOf(bullet.target);
                        if (idx !== -1) enemies.splice(idx, 1);
                    }
                    scene.remove(bullet.mesh);
                    bullets.splice(i, 1);
                    i--;
                }
            }
            
            if (baseRing) baseRing.rotation.z += 0.02;
        }
        
        function gameOver() {
            userWins++;
            saveData();
            const overlay = document.createElement('div');
            overlay.style.position = 'absolute';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.backgroundColor = 'rgba(0,0,0,0.9)';
            overlay.style.display = 'flex';
            overlay.style.flexDirection = 'column';
            overlay.style.alignItems = 'center';
            overlay.style.justifyContent = 'center';
            overlay.style.zIndex = '1000';
            overlay.innerHTML = `<h1 style="font-size:48px;">💀 GAME OVER 💀</h1><p style="font-size:24px;">Счёт: ${Math.floor(score)}</p><p style="font-size:18px;">🏆 Побед: ${userWins}</p><button id="restartBtn" style="padding:15px 40px;font-size:20px;cursor:pointer;margin-top:20px;">🔄 ИГРАТЬ СНОВА</button>`;
            document.body.appendChild(overlay);
            document.getElementById('restartBtn').onclick = () => location.reload();
        }
        
        // Анимация
        let prevTime = performance.now() / 1000;
        function animate() {
            const now = performance.now() / 1000;
            let dt = now - prevTime;
            prevTime = now;
            if (dt > 0.1) dt = 0.033;
            
            if (currentUser && baseHealth > 0) gameLoop(dt);
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        if (currentUser) {
            document.getElementById('username').value = currentUser;
        }
        
        updateUI();
        console.log('🎮 Toilet Tower Defense 3D запущена!');
    </script>
</body>
</html>
