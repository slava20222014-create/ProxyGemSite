            <div class="auth-divider">Придумайте ник</div>
            <div style="display:flex; gap:12px; flex-direction:column;">
                <input type="text" id="nicknameInput" placeholder="Ваш никнейм" />
                <button class="btn-primary" id="setNicknameBtn" style="padding:12px;">Проверить и зарегистрировать</button>
            </div>
            <div id="nicknameStatus" style="margin-top:8px; font-size:0.85rem; color:#888; min-height:20px;"></div>
            <button class="btn-secondary" id="closeAuthModal" style="margin-top:12px;">Закрыть</button>
        </div>
    </div>

    <!-- ===== МОДАЛ УСПЕШНОЙ РЕГИСТРАЦИИ ===== -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <div class="success-box">
                <h2>Успешная регистрация</h2>
                <p><i class="fas fa-check-circle"></i> Добро пожаловать в ProxyGem!</p>
                <button class="btn-primary" id="finishRegistrationBtn"><i class="fas fa-check"></i> Завершить</button>
            </div>
        </div>
    </div>

    <!-- ===== МОДАЛ ВЫХОДА ===== -->
    <div class="modal-overlay" id="logoutModal">
        <div class="modal-content">
            <h2 style="font-size:1.8rem; font-weight:800; margin-bottom:8px; background:linear-gradient(135deg,#f0f0f0,#888); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Выйти из аккаунта</h2>
            <p style="color:#888; margin:20px 0;">Вы уверены, что хотите выйти?</p>
            <div style="display:flex; gap:12px; flex-direction:column;">
                <button class="btn-secondary" id="cancelLogoutBtn" style="margin-top:0;">Отмена</button>
                <button class="btn-primary" id="confirmLogoutBtn" style="background:#ff4444; color:#fff;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </div>
    </div>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <div class="profile-panel-wrapper">
        <div class="container">
            <div class="panel-title">
                <i class="fas fa-user-circle"></i> Профиль <span>ProxyGem</span>
            </div>

            <div id="profileContainer">
                <!-- Контент загружается через JS -->
            </div>
        </div>
    </div>

    <script>
        // ===== КОНСТАНТЫ =====
        const CLIENT_ID = '8155864182';
        const ADMIN_TELEGRAM_ID = '123456789';
        const ADMIN_USERNAME = 'MisterGemer';
        const VISITS_KEY = 'proxygem_visits';

        // ===== ХРАНИЛИЩЕ =====
        function getData(key) {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : [];
            } catch { return []; }
        }
        function setData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }
        function getVisits() {
            try {
                return parseInt(localStorage.getItem(VISITS_KEY)) || 0;
            } catch { return 0; }
        }

        function getUsers() { return getData('proxygem_users'); }
        function saveUsers(users) { setData('proxygem_users', users); }
        function getBans() { return getData('proxygem_bans'); }
        function saveBans(bans) { setData('proxygem_bans', bans); }

        function isUserBanned(userId) {
            const bans = getBans();
            const now = Date.now();
            const ban = bans.find(b => b.userId === userId && b.until > now);
            return ban || null;
        }

        function findUserByTelegramId(telegramId) {
            return getUsers().find(u => u.telegramId === String(telegramId));
        }

        function findUserByNickname(nickname) {
            return getUsers().find(u => u.nickname && u.nickname.toLowerCase() === nickname.toLowerCase());
        }

        function generateAccessKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()';
            let result = '';
            for (let i = 0; i < 25; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function generateYTId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 9; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        function createUser(telegramId, name, nickname, avatar) {
            const users = getUsers();
            const newUser = {
                id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
                telegramId: String(telegramId),
                name: name,
                nickname: nickname || name,
                avatar: avatar || 'images/avatar.png',
                createdAt: Date.now(),
                isAdmin: false,
                isYT: false,
                ytId: generateYTId(),
                accessKey: generateAccessKey(),
                timeOnSite: 0,
                lastActive: Date.now(),
                settings: {
                    language: 'ru',
                    notifications: false
                }
            };

            // Проверка на администратора
            if (String(telegramId) === ADMIN_TELEGRAM_ID || 
                name.toLowerCase().includes('mistergemer') ||
                nickname && nickname.toLowerCase().includes('mistergemer')) {
                newUser.isAdmin = true;
            }

            users.push(newUser);
            saveUsers(users);
            return newUser;
        }

        // ===== ТЕКУЩИЙ ПОЛЬЗОВАТЕЛЬ =====
        let currentUser = null;
        let isAdmin = false;

        // ===== МОДАЛЫ =====
        function openModal(id) {
            document.getElementById(id).classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
            document.body.style.overflow = '';
        }

        function showAuthModal() { openModal('authModal'); }
        function hideAuthModal() { closeModal('authModal'); }
        function showSuccessModal() { openModal('successModal'); }
        function hideSuccessModal() { closeModal('successModal'); }
        function showLogoutModal() { openModal('logoutModal'); }
        function hideLogoutModal() { closeModal('logoutModal'); }

        // ===== ОБРАБОТЧИКИ МОДАЛОВ =====
        document.getElementById('closeAuthModalBtn').addEventListener('click', hideAuthModal);
        document.getElementById('closeAuthModal').addEventListener('click', hideAuthModal);
        document.getElementById('finishRegistrationBtn').addEventListener('click', hideSuccessModal);
        document.getElementById('cancelLogoutBtn').addEventListener('click', hideLogoutModal);

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('open');
                    document.body.style.overflow = '';
                }
            });
        });

        // ===== АУТЕНТИФИКАЦИЯ =====
        window.onTelegramAuth = function(data) {
            try {
                const payload = JSON.parse(atob(data.id_token.split('.')[1]));
                const telegramId = payload.sub || payload.id;
                const name = payload.name || payload.given_name || 'User';
                const username = payload.preferred_username || name;
                const avatar = payload.picture || null;

                let user = findUserByTelegramId(telegramId);
                
                if (!user) {
                    window._pendingUser = { telegramId, name, username, avatar };
                    document.getElementById('nicknameStatus').textContent = 'Придумайте уникальный никнейм';
                    document.getElementById('nicknameStatus').style.color = '#888';
                    showAuthModal();
                    return;
                }

                const ban = isUserBanned(user.id);
                if (ban) {
                    alert('Ваш аккаунт забанен до ' + new Date(ban.until).toLocaleString());
                    return;
                }

                currentUser = user;
                isAdmin = user.isAdmin || false;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                hideAuthModal();
                renderProfile();
                alert('Добро пожаловать, ' + user.name + '!');
            } catch (e) {
                console.error('Ошибка при обработке Telegram login:', e);
                alert('Ошибка входа через Telegram. Попробуйте снова.');
            }
        };

        document.getElementById('telegramLoginBtn').addEventListener('click', function() {
            if (typeof Telegram !== 'undefined' && Telegram.Login) {
                Telegram.Login.auth({
                    client_id: CLIENT_ID,
                    scope: ['profile', 'phone'],
                    lang: 'ru',
                    nonce: Math.random().toString(36).substr(2, 10)
                }, function(data) {
                    if (data.error) {
                        console.error('Telegram login error:', data.error);
                        alert('Ошибка входа: ' + data.error);
                    } else if (data.id_token) {
                        window.onTelegramAuth(data);
                    }
                });
            } else {
                alert('Библиотека Telegram не загружена. Попробуйте обновить страницу.');
            }
        });

        document.getElementById('setNicknameBtn').addEventListener('click', function() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const status = document.getElementById('nicknameStatus');

            if (!window._pendingUser) {
                status.textContent = 'Сначала войдите через Telegram';
                status.style.color = '#ff6b6b';
                return;
            }

            if (!nickname) {
                status.textContent = 'Введите никнейм';
                status.style.color = '#ff6b6b';
                return;
            }

            if (nickname.length < 3) {
                status.textContent = 'Ник должен быть минимум 3 символа';
                status.style.color = '#ff6b6b';
                return;
            }

            const existing = findUserByNickname(nickname);
            if (existing) {
                status.textContent = 'Этот ник уже занят, выберите другой';
                status.style.color = '#ff6b6b';
                return;
            }

            const { telegramId, name, avatar } = window._pendingUser;
            const user = createUser(telegramId, name, nickname, avatar);

            currentUser = user;
            isAdmin = user.isAdmin || false;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            hideAuthModal();
            showSuccessModal();
            renderProfile();
            window._pendingUser = null;
        });

        // ===== ВЫХОД =====
        document.getElementById('confirmLogoutBtn').addEventListener('click', function() {
            currentUser = null;
            isAdmin = false;
            localStorage.removeItem('currentUser');
            hideLogoutModal();
            renderProfile();
            alert('Вы вышли из аккаунта');
        });

        // ===== ВХОД ПО КЛЮЧУ =====
        function loginByKey(key) {
            const users = getUsers();
            const user = users.find(u => u.accessKey === key);
            if (!user) {
                return { success: false, message: 'Неверный ключ доступа' };
            }
            const ban = isUserBanned(user.id);
            if (ban) {
                return { success: false, message: 'Пользователь забанен до ' + new Date(ban.until).toLocaleString() };
            }
            currentUser = user;
            isAdmin = user.isAdmin || false;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            renderProfile();
            return { success: true, message: 'Успешный вход!' };
        }

        // ===== ВОССТАНОВЛЕНИЕ СЕССИИ =====
        function restoreSession() {
            try {
                const saved = localStorage.getItem('currentUser');
                if (saved) {
                    const user = JSON.parse(saved);
                    const ban = isUserBanned(user.id);
                    if (ban) {
                        localStorage.removeItem('currentUser');
                        currentUser = null;
                        isAdmin = false;
                    } else {
                        currentUser = user;
                        isAdmin = user.isAdmin || false;
                    }
                }
            } catch { currentUser = null; }
        }

        // ===== ОБНОВЛЕНИЕ ПРОФИЛЯ =====
        function updateProfileUI() {
            const profileBtn = document.getElementById('profileBtn');
            const nameSpan = document.getElementById('profileName');

            if (currentUser) {
                const ban = isUserBanned(currentUser.id);
                if (ban) {
                    nameSpan.textContent = 'Забанен';
                    profileBtn.style.borderColor = 'rgba(255,50,50,0.3)';
                    return;
                }
                nameSpan.textContent = currentUser.nickname || currentUser.name;
                profileBtn.style.borderColor = 'rgba(255,255,255,0.06)';
            } else {
                nameSpan.textContent = 'Войти';
            }
        }

        // ===== РЕНДЕР ПРОФИЛЯ =====
        function renderProfile() {
            const container = document.getElementById('profileContainer');
            updateProfileUI();

            if (!currentUser) {
                container.innerHTML = `
                    <div class="auth-container">
                        <h2>Вход в аккаунт</h2>
                        <p>Войдите через Telegram или используйте ключ доступа</p>
                        <button class="tg-auth-button" id="telegramLoginBtn2">
                            <i class="fab fa-telegram-plane"></i> Sign In with Telegram
                        </button>
                        <div class="auth-divider">или</div>
                        <div class="key-login-section" style="max-width:100%;">
                            <div class="sub">Введите ключ доступа с сайта</div>
                            <div class="input-group">
                                <input type="password" id="accessKeyInput" placeholder="Введите ключ..." />
                                <button class="btn-login-key" id="loginKeyBtn">Войти</button>
                            </div>
                            <div id="keyLoginStatus" class="key-status"></div>
                        </div>
                        <div style="margin-top:20px; text-align:center; color:#555; font-size:0.85rem;">
                            <i class="fas fa-info-circle"></i> Ключ можно получить в профиле на главном сайте
                        </div>
                    </div>
                `;

                document.getElementById('telegramLoginBtn2').addEventListener('click', function() {
                    if (typeof Telegram !== 'undefined' && Telegram.Login) {
                        Telegram.Login.auth({
                            client_id: CLIENT_ID,
                            scope: ['profile', 'phone'],
                            lang: 'ru',
                            nonce: Math.random().toString(36).substr(2, 10)
                        }, function(data) {
                            if (data.error) {
                                console.error('Telegram login error:', data.error);
                                alert('Ошибка входа: ' + data.error);
                            } else if (data.id_token) {
                                window.onTelegramAuth(data);
                            }
                        });
                    } else {
                        alert('Библиотека Telegram не загружена. Попробуйте обновить страницу.');
                    }
                });

                document.getElementById('loginKeyBtn').addEventListener('click', function() {
                    const key = document.getElementById('accessKeyInput').value.trim();
                    const status = document.getElementById('keyLoginStatus');
                    if (!key) {
                        status.textContent = 'Введите ключ доступа';
                        status.style.color = '#ff6b6b';
                        return;
                    }
                    const result = loginByKey(key);
                    status.textContent = result.message;
                    status.style.color = result.success ? '#6bff6b' : '#ff6b6b';
                    if (result.success) {
                        document.getElementById('accessKeyInput').value = '';
                        renderProfile();
                    }
                });

                document.getElementById('accessKeyInput').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        document.getElementById('loginKeyBtn').click();
                    }
                });

                return;
            }

            const ban = isUserBanned(currentUser.id);
            const isBanned = !!ban;
            const banTime = isBanned ? Math.ceil((ban.until - Date.now()) / 1000 / 60) : 0;

            const groupName = currentUser.isAdmin ? 'Администратор' : 'Пользователь';
            const groupClass = currentUser.isAdmin ? 'admin' : 'user';
            const bannedText = isBanned ? 'Да (' + banTime + ' мин)' : 'Нет';
            const bannedClass = isBanned ? 'banned' : '';

            const regDate = new Date(currentUser.createdAt).toLocaleDateString('ru-RU', {
                day: '2-digit', month: '2-digit', year: 'numeric'
            });

            container.innerHTML = `
                <div class="profile-panel">
                    <div class="profile-sidebar">
                        <div class="profile-avatar-block">
                            <img src="${currentUser.avatar || 'images/avatar.png'}" alt="Avatar" id="sidebarAvatar" />
                            <div class="greeting">
                                Привет, <span class="username">${escapeHtml(currentUser.nickname || currentUser.name)}</span>
                            </div>
                        </div>
                        <div class="profile-menu">
                            <div class="menu-item active" data-tab="account"><i class="fas fa-user"></i> Аккаунт</div>
                            <div class="menu-item" data-tab="videos"><i class="fas fa-video"></i> Видеообзоры</div>
                            <div class="menu-item logout" data-tab="logout"><i class="fas fa-sign-out-alt"></i> Выйти</div>
                        </div>
                    </div>
                    <div class="profile-content">
                        <!-- Аккаунт -->
                        <div class="profile-tab active" id="tab-account">
                            <h3><i class="fas fa-user-circle"></i> Аккаунт</h3>

                            <div class="avatar-section">
                                <img src="${currentUser.avatar || 'images/avatar.png'}" alt="Avatar" class="avatar-preview" id="profileAvatar" />
                                <label class="avatar-upload-btn">
                                    <i class="fas fa-cloud-upload-alt"></i> Сменить аватар
                                    <input type="file" id="avatarInput" accept="image/*" />
                                </label>
                            </div>

                            <div class="nickname-section">
                                <input type="text" id="nicknameInputProfile" value="${escapeHtml(currentUser.nickname || '')}" placeholder="Ваш никнейм" />
                                <button class="btn-save" id="saveNicknameBtn">Сохранить</button>
                                <div class="nickname-status" id="nicknameStatusProfile"></div>
                            </div>

                            <div class="info-grid">
                                <div class="info-row">
                                    <span class="label">Группа</span>
                                    <span class="value ${groupClass}">${groupName}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">YT ID</span>
                                    <span class="value">${currentUser.ytId || '—'}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">Дата регистрации</span>
                                    <span class="value">${regDate}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">Забанен?</span>
                                    <span class="value ${bannedClass}">${bannedText}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">Telegram ID</span>
                                    <span class="value">${currentUser.telegramId || '—'}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">Ключ доступа</span>
                                    <span class="value" style="font-family:monospace; font-size:0.9rem; background:rgba(255,255,255,0.02); padding:4px 12px; border-radius:8px; letter-spacing:1px;">${currentUser.accessKey || '—'}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Видеообзоры -->
                        <div class="profile-tab" id="tab-videos">
                            <h3><i class="fas fa-video"></i> Видеообзоры</h3>
                            <div class="video-grid">
                                <div class="video-card">
                                    <div class="video-wrapper">
                                        <iframe src="https://www.youtube.com/embed/LcqYgVdzP8o" allowfullscreen></iframe>
                                    </div>
                                    <div class="video-info">
                                        <h4>ЛУЧШИЙ ОБХОД: DISCORD И YOUTUBE СНОВА РАБОТАЕТ! НОВЫЙ ОБХОД | PROXYGEM</h4>
                                        <div class="channel">
                                            <img src="https://yt3.googleusercontent.com/ytc/AIdro_l3IhNXhWLl82IXxWXZqRsW-L6goN7N0xQmKboCzA=s88-c-k-c0x00ffffff-no-rj" alt="Channel" />
                                            <span>ProxyGem</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // ===== ОБРАБОТЧИКИ МЕНЮ =====
            document.querySelectorAll('.profile-menu .menu-item').forEach(item => {
                item.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    if (tab === 'logout') {
                        showLogoutModal();
                        return;
                    }
                    document.querySelectorAll('.profile-menu .menu-item').forEach(el => el.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.profile-tab').forEach(el => el.classList.remove('active'));
                    const tabEl = document.getElementById('tab-' + tab);
                    if (tabEl) tabEl.classList.add('active');
                });
            });

            // ===== АВАТАР =====
            document.getElementById('avatarInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const avatarUrl = ev.target.result;
                        document.querySelectorAll('#profileAvatar, #sidebarAvatar').forEach(el => {
                            el.src = avatarUrl;
                        });
                        if (currentUser) {
                            currentUser.avatar = avatarUrl;
                            const users = getUsers();
                            const idx = users.findIndex(u => u.id === currentUser.id);
                            if (idx !== -1) {
                                users[idx].avatar = avatarUrl;
                                saveUsers(users);
                                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                            }
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });

            // ===== СМЕНА НИКА =====
            document.getElementById('saveNicknameBtn').addEventListener('click', function() {
                const nickname = document.getElementById('nicknameInputProfile').value.trim();
                const status = document.getElementById('nicknameStatusProfile');

                if (!nickname) {
                    status.textContent = 'Введите никнейм';
                    status.style.color = '#ff6b6b';
                    return;
                }

                if (nickname.length < 3) {
                    status.textContent = 'Ник должен быть минимум 3 символа';
                    status.style.color = '#ff6b6b';
                    return;
                }

                const existing = findUserByNickname(nickname);
                if (existing && existing.id !== currentUser.id) {
                    status.textContent = 'Этот ник уже занят';
                    status.style.color = '#ff6b6b';
                    return;
                }

                const users = getUsers();
                const idx = users.findIndex(u => u.id === currentUser.id);
                if (idx !== -1) {
                    users[idx].nickname = nickname;
                    saveUsers(users);
                    currentUser = users[idx];
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    status.textContent = 'Ник успешно изменён!';
                    status.style.color = '#6bff6b';
                    renderProfile();
                    updateProfileUI();
                }
            });

            // ===== ВВОД КЛЮЧА В АККАУНТЕ (уже есть) =====
            // Добавляем возможность скопировать ключ
            const keyDisplay = document.querySelector('.info-row .value[style*="font-family:monospace"]');
            if (keyDisplay) {
                keyDisplay.style.cursor = 'pointer';
                keyDisplay.title = 'Нажмите чтобы скопировать';
                keyDisplay.addEventListener('click', function() {
                    const key = this.textContent.trim();
                    if (key && key !== '—') {
                        if (navigator.clipboard) {
                            navigator.clipboard.writeText(key);
                            this.style.color = '#6bff6b';
                            setTimeout(() => { this.style.color = ''; }, 1500);
                        } else {
                            fallbackCopy(key);
                        }
                    }
                });
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== ПРОФИЛЬ КНОПКА =====
        document.getElementById('profileBtn').addEventListener('click', function() {
            if (currentUser) {
                const ban = isUserBanned(currentUser.id);
                if (ban) {
                    alert('Вы забанены до ' + new Date(ban.until).toLocaleString());
                    return;
                }
                renderProfile();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showAuthModal();
            }
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        restoreSession();
        renderProfile();
        updateProfileUI();
    </script>
